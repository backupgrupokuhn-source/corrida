<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Corrida dos Campeões — Grupo Kuhn</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800;900&family=Paytone+One&display=swap" rel="stylesheet">
<style>
:root {
  --ouro:    #FFD700;
  --rosa:    #FF2D7A;
  --branco:  #FFFFFF;
  --preto:   #0A0A0F;
  --verde:   #00C853;
  --azul:    #1A56DB;
  --card-bg: rgba(255,255,255,0.06);
  --border:  rgba(255,255,255,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--preto);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG DINÂMICO */
body::before {
  content:''; position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 0% 0%,   rgba(26,86,219,.25) 0%, transparent 50%),
    radial-gradient(ellipse at 100% 0%,  rgba(255,45,122,.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(255,215,0,.10)  0%, transparent 50%),
    var(--preto);
}

/* LINHA DE CORRIDA */
body::after {
  content:''; position:fixed; top:0; left:50%; width:2px; height:100%;
  background: linear-gradient(to bottom, transparent, rgba(255,215,0,.15), transparent);
  z-index:0;
}

/* PARTÍCULAS */
.p { position:fixed; pointer-events:none; z-index:0; animation:fp 6s ease-in-out infinite; opacity:.25; font-size:1.4rem; }
.p:nth-child(1){top:5%;left:4%;animation-delay:0s}
.p:nth-child(2){top:15%;right:5%;animation-delay:.8s;font-size:1rem}
.p:nth-child(3){top:45%;left:2%;animation-delay:2s;font-size:1.8rem}
.p:nth-child(4){top:60%;right:3%;animation-delay:.4s;font-size:1.1rem}
.p:nth-child(5){bottom:20%;left:8%;animation-delay:1.5s;font-size:1.2rem}
.p:nth-child(6){bottom:8%;right:10%;animation-delay:2.8s;font-size:.9rem}
.p:nth-child(7){top:30%;left:45%;animation-delay:1.2s;font-size:1rem}
@keyframes fp { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-16px) rotate(20deg)} }

.wrap { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:16px 16px 56px; }

/* ── HEADER ── */
.header { text-align:center; margin-bottom:22px; animation:sd .7s ease; }
@keyframes sd { from{opacity:0;transform:translateY(-32px)} to{opacity:1;transform:translateY(0)} }

/* DUELO VISUAL */
.duelo {
  display:flex; align-items:flex-end; justify-content:center;
  gap:0; margin-bottom:14px; position:relative;
}

/* PERSONAGEM VINI */
.char-vini {
  display:flex; flex-direction:column; align-items:center;
  animation:floatL 3.5s ease-in-out infinite;
}
@keyframes floatL { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-12px) rotate(1deg)} }

.char-virginia {
  display:flex; flex-direction:column; align-items:center;
  animation:floatR 3.5s ease-in-out infinite;
  animation-delay:.5s;
}
@keyframes floatR { 0%,100%{transform:translateY(0) rotate(2deg)} 50%{transform:translateY(-12px) rotate(-1deg)} }

.char-svg { width:90px; height:90px; }

.vs-badge {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  width:52px; height:52px; border-radius:50%; margin-bottom:10px;
  background: linear-gradient(135deg, #FFD700, #FF6B00);
  box-shadow: 0 0 24px rgba(255,215,0,.7), 0 0 60px rgba(255,215,0,.3);
  font-family:'Bebas Neue',cursive; font-size:1.5rem; color:#000;
  flex-shrink:0; align-self:center; z-index:2;
  animation: vsPulse 1.5s ease-in-out infinite;
}
@keyframes vsPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

.char-name-vini {
  font-family:'Bebas Neue',cursive; font-size:.95rem; letter-spacing:2px;
  color:var(--azul); text-shadow:0 0 12px rgba(26,86,219,.8);
}
.char-name-virginia {
  font-family:'Bebas Neue',cursive; font-size:.95rem; letter-spacing:2px;
  color:var(--rosa); text-shadow:0 0 12px rgba(255,45,122,.8);
}

/* LOGO */
.logo-strip {
  display:inline-flex; align-items:center; gap:10px;
  background:linear-gradient(135deg, rgba(26,86,219,.25), rgba(255,45,122,.25));
  border:1.5px solid rgba(255,255,255,.12);
  border-radius:16px; padding:10px 20px; margin-bottom:10px;
  backdrop-filter:blur(8px);
}
.logo-small { font-family:'Bebas Neue',cursive; font-size:.9rem; color:rgba(255,255,255,.5); letter-spacing:3px; }
.logo-big   { font-family:'Bebas Neue',cursive; font-size:1.8rem; color:white; line-height:1; letter-spacing:1px; }
.logo-dot   { color:var(--ouro); }

.title-main {
  font-family:'Bebas Neue',cursive; font-size:2.4rem; color:white; line-height:1;
  letter-spacing:2px;
  text-shadow: 3px 3px 0 rgba(0,0,0,.5);
}
.title-vini  { color:var(--azul); text-shadow:0 0 20px rgba(26,86,219,.8), 3px 3px 0 rgba(0,0,0,.5); }
.title-vs    { color:var(--ouro); font-size:1.8rem; margin:0 6px; }
.title-virg  { color:var(--rosa); text-shadow:0 0 20px rgba(255,45,122,.8), 3px 3px 0 rgba(0,0,0,.5); }
.subtitle { font-size:.82rem; color:rgba(255,255,255,.45); margin-top:6px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }

/* ── CARD ── */
.card {
  background:var(--card-bg); backdrop-filter:blur(12px);
  border-radius:22px; padding:26px 22px;
  border:1.5px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.card-title { font-family:'Bebas Neue',cursive; font-size:1.5rem; color:var(--ouro); text-align:center; margin-bottom:4px; letter-spacing:2px; }
.card-sub   { font-size:.82rem; color:rgba(255,255,255,.4); text-align:center; margin-bottom:18px; }

.fg { margin-bottom:13px; }
label { display:block; font-size:.72rem; font-weight:900; color:rgba(255,255,255,.55); margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
input[type="text"] {
  width:100%; padding:13px 15px;
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:12px;
  font-size:1rem; font-family:'Nunito',sans-serif; font-weight:700;
  color:white; background:rgba(255,255,255,.06);
  outline:none; transition:all .2s;
}
input[type="text"]:focus { border-color:var(--ouro); background:rgba(255,215,0,.08); box-shadow:0 0 0 3px rgba(255,215,0,.15); }
input[type="text"]::placeholder { color:rgba(255,255,255,.2); font-weight:400; }

.btn-ok {
  width:100%; padding:15px;
  background:linear-gradient(135deg, var(--ouro), #FF8C00);
  color:#000; border:none; border-radius:14px;
  font-family:'Bebas Neue',cursive; font-size:1.4rem; letter-spacing:2px;
  cursor:pointer; box-shadow:0 6px 24px rgba(255,215,0,.45);
  transition:all .2s; margin-top:6px;
}
.btn-ok:active { transform:scale(.97); }
.btn-ok:disabled { background:#2a2a2a; box-shadow:none; color:#555; cursor:not-allowed; }

.err {
  background:rgba(255,45,122,.12); border:1px solid rgba(255,45,122,.5);
  border-radius:10px; padding:11px 14px; color:#FF80AB;
  font-size:.88rem; font-weight:700; text-align:center;
  margin-top:10px; animation:shake .4s ease;
}
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

/* ── TELAS ── */
.screen { display:none; }
.screen.active { display:block; animation:fi .45s ease; }
@keyframes fi { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

/* ── BADGE ── */
.badge {
  background:linear-gradient(135deg, rgba(255,215,0,.15), rgba(255,45,122,.15));
  border:1.5px solid rgba(255,215,0,.3);
  border-radius:50px; padding:9px 20px; text-align:center; margin-bottom:18px;
}
.badge span { font-size:.72rem; color:rgba(255,255,255,.5); font-weight:800; text-transform:uppercase; letter-spacing:1px; }
.badge strong { display:block; font-family:'Bebas Neue',cursive; font-size:1.5rem; color:var(--ouro); line-height:1.1; }

/* ── ROLETA ── */
.wheel-wrap {
  display:flex; flex-direction:column; align-items:center; margin-bottom:18px;
  position:relative;
}

/* MINI CHARS NA ROLETA */
.wheel-chars {
  display:flex; justify-content:space-between; width:320px; margin-bottom:-8px; z-index:2; position:relative;
}
.wc-char { font-size:1.8rem; animation:fp 2s ease-in-out infinite; }
.wc-char:last-child { animation-delay:.5s; }

.wheel-ring {
  position:relative; width:310px; height:310px; border-radius:50%;
  box-shadow:
    0 0 0 5px var(--preto),
    0 0 0 8px var(--ouro),
    0 0 0 11px var(--preto),
    0 0 40px rgba(255,215,0,.5),
    0 10px 50px rgba(0,0,0,.8);
}
#wc { width:310px; height:310px; border-radius:50%; display:block; }
.wheel-mid {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:56px; height:56px; background:var(--preto); border-radius:50%;
  border:3px solid var(--ouro);
  display:flex; align-items:center; justify-content:center;
  font-size:1.7rem; z-index:5;
  box-shadow:0 0 0 3px var(--preto), 0 0 20px rgba(255,215,0,.7);
}

/* SETA DA ROLETA */
.wheel-arrow {
  position:absolute; top:-18px; left:50%; transform:translateX(-50%);
  width:0; height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:26px solid var(--ouro);
  z-index:10;
  filter:drop-shadow(0 2px 8px rgba(255,215,0,.8));
}

.btn-spin {
  width:100%; padding:17px;
  background:linear-gradient(135deg, var(--azul), #0D2B7A);
  color:white; border:none; border-radius:14px;
  font-family:'Bebas Neue',cursive; font-size:1.5rem; letter-spacing:2px;
  cursor:pointer; box-shadow:0 6px 24px rgba(26,86,219,.5);
  transition:all .2s; margin-top:16px;
  position:relative; overflow:hidden;
}
.btn-spin::before {
  content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
  animation:shine 2s infinite;
}
@keyframes shine { to{left:100%} }
.btn-spin:active { transform:scale(.97); }
.btn-spin:disabled { background:#1a1a2e; color:#333; box-shadow:none; cursor:not-allowed; }
.btn-spin:disabled::before { display:none; }

/* ── RESULTADO ── */
.res-card {
  background:var(--card-bg); backdrop-filter:blur(12px);
  border-radius:22px; overflow:hidden;
  border:1.5px solid rgba(255,215,0,.25);
  box-shadow:0 12px 50px rgba(0,0,0,.7); margin-bottom:14px;
}
.res-head {
  background:linear-gradient(135deg, #0D2B7A, var(--azul));
  padding:26px 18px; text-align:center; position:relative; overflow:hidden;
}
.res-head.team-virginia {
  background:linear-gradient(135deg, #7B0030, var(--rosa));
}
.res-head::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 30% 50%, rgba(255,255,255,.12), transparent 60%);
}
.res-head::after {
  content:'⚽'; position:absolute; right:-10px; bottom:-10px;
  font-size:5rem; opacity:.08;
}
.res-head.team-virginia::after { content:'📸'; }

.res-emoji { font-size:3.5rem; display:block; margin-bottom:5px; animation:bi .6s ease; }
@keyframes bi { 0%{transform:scale(0) rotate(-20deg)} 60%{transform:scale(1.25) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
.res-titulo { font-family:'Bebas Neue',cursive; font-size:1rem; color:rgba(255,255,255,.75); letter-spacing:2px; }
.res-premio { font-family:'Bebas Neue',cursive; font-size:2rem; color:white; line-height:1.1; margin-top:4px; text-shadow:2px 2px 0 rgba(0,0,0,.4); letter-spacing:1px; }
.res-body { padding:18px; }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.06); font-size:.88rem; }
.info-row:last-child { border-bottom:none; }
.il { color:rgba(255,255,255,.35); font-weight:800; text-transform:uppercase; font-size:.7rem; letter-spacing:.5px; }
.iv { font-weight:800; color:white; text-align:right; max-width:65%; }

.cod-box {
  background:rgba(255,215,0,.08); border:1.5px dashed rgba(255,215,0,.45);
  border-radius:12px; padding:13px; text-align:center; margin:14px 0 2px;
}
.cod-label { font-size:.7rem; font-weight:900; color:rgba(255,215,0,.7); text-transform:uppercase; letter-spacing:1px; }
.cod-val { font-family:'Bebas Neue',cursive; font-size:2rem; color:var(--ouro); letter-spacing:4px; }

/* PLACAR CORRIDA */
.race-bar {
  display:flex; align-items:center; gap:0; margin:14px 0; border-radius:12px; overflow:hidden;
  border:1.5px solid rgba(255,255,255,.08); height:44px;
}
.race-vini {
  flex:1; background:linear-gradient(135deg, var(--azul), #1A56DB);
  display:flex; align-items:center; justify-content:flex-start; padding-left:10px; gap:6px;
  font-family:'Bebas Neue',cursive; font-size:.95rem; color:white; letter-spacing:1px;
}
.race-mid { width:32px; background:#000; display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.race-virginia {
  flex:1; background:linear-gradient(135deg, var(--rosa), #C2185B);
  display:flex; align-items:center; justify-content:flex-end; padding-right:10px; gap:6px;
  font-family:'Bebas Neue',cursive; font-size:.95rem; color:white; letter-spacing:1px;
}

/* utils */
.ld { display:inline-block; width:17px; height:17px; border:3px solid rgba(255,255,255,.2); border-top-color:var(--ouro); border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:7px; }
@keyframes spin { to{transform:rotate(360deg)} }
.cf { position:fixed; top:-10px; border-radius:2px; animation:cff linear forwards; pointer-events:none; z-index:999; }
@keyframes cff { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<div class="p">⚽</div>
<div class="p">📸</div>
<div class="p">🏆</div>
<div class="p">💎</div>
<div class="p">⭐</div>
<div class="p">👑</div>
<div class="p">🎯</div>

<div class="wrap">

  <!-- HEADER -->
  <div class="header">

    <!-- DUELO VISUAL -->
    <div class="duelo">
      <div class="char-vini">
        <!-- VINI JR SVG -->
        <svg class="char-svg" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Corpo Real Madrid -->
          <circle cx="45" cy="22" r="16" fill="#1A56DB"/>
          <circle cx="45" cy="22" r="16" fill="url(#viniHead)"/>
          <!-- Rosto -->
          <circle cx="45" cy="22" r="13" fill="#8B5E3C"/>
          <!-- Cabelo -->
          <path d="M32 18 Q36 8 45 9 Q54 8 58 18 Q55 12 45 12 Q35 12 32 18Z" fill="#1a0a00"/>
          <!-- Dreads/cabelo lateral -->
          <path d="M32 19 Q28 24 30 30" stroke="#1a0a00" stroke-width="3" stroke-linecap="round"/>
          <path d="M58 19 Q62 24 60 30" stroke="#1a0a00" stroke-width="3" stroke-linecap="round"/>
          <!-- Olhos -->
          <circle cx="40" cy="22" r="2.5" fill="#1a0a00"/>
          <circle cx="50" cy="22" r="2.5" fill="#1a0a00"/>
          <circle cx="40.8" cy="21.2" r="0.9" fill="white"/>
          <circle cx="50.8" cy="21.2" r="0.9" fill="white"/>
          <!-- Sorriso -->
          <path d="M40 28 Q45 32 50 28" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <!-- Camisa Real Madrid branca -->
          <path d="M33 38 Q45 34 57 38 L60 62 Q45 66 30 62Z" fill="white"/>
          <!-- Detalhe camisa -->
          <path d="M40 38 L43 55" stroke="rgba(0,0,0,.1)" stroke-width="1"/>
          <!-- Número -->
          <text x="45" y="55" text-anchor="middle" fill="#1A56DB" font-size="10" font-weight="bold" font-family="Arial">7</text>
          <!-- Calção azul -->
          <path d="M33 62 L37 78 L45 76 L53 78 L57 62 Q45 66 33 62Z" fill="#1A56DB"/>
          <!-- Meias brancas -->
          <rect x="37" y="78" width="7" height="10" rx="2" fill="white"/>
          <rect x="46" y="78" width="7" height="10" rx="2" fill="white"/>
          <!-- Chuteira dourada -->
          <path d="M35 88 Q37 90 44 89 L44 88" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
          <path d="M55 88 Q53 90 46 89 L46 88" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
          <!-- Bola -->
          <circle cx="72" cy="78" r="9" fill="white" stroke="#1a0a00" stroke-width="1.5"/>
          <path d="M72 69 L69 74 L75 74Z" fill="#1a0a00"/>
          <path d="M66 75 L69 74 L69 82 L66 80Z" fill="#1a0a00"/>
          <path d="M78 75 L75 74 L75 82 L78 80Z" fill="#1a0a00"/>
          <defs>
            <radialGradient id="viniHead" cx="40%" cy="35%" r="60%">
              <stop offset="0%" stop-color="rgba(255,255,255,.1)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,.15)"/>
            </radialGradient>
          </defs>
        </svg>
        <div class="char-name-vini">⚽ VINI JR</div>
      </div>

      <div class="vs-badge">VS</div>

      <div class="char-virginia">
        <!-- VIRGINIA SVG -->
        <svg class="char-svg" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Cabelo loiro volumoso -->
          <path d="M23 32 Q20 18 33 10 Q45 5 57 10 Q70 18 67 32 Q64 22 45 20 Q26 22 23 32Z" fill="#FFD700"/>
          <!-- Cachos laterais -->
          <path d="M23 32 Q18 40 22 52 Q24 46 26 40Z" fill="#FFD700"/>
          <path d="M67 32 Q72 40 68 52 Q66 46 64 40Z" fill="#FFD700"/>
          <!-- Rosto -->
          <ellipse cx="45" cy="30" rx="18" ry="20" fill="#FDDBB4"/>
          <!-- Blush -->
          <ellipse cx="36" cy="34" rx="5" ry="3" fill="rgba(255,100,120,.25)"/>
          <ellipse cx="54" cy="34" rx="5" ry="3" fill="rgba(255,100,120,.25)"/>
          <!-- Olhos -->
          <ellipse cx="39" cy="28" rx="3" ry="3.5" fill="#3D2B1A"/>
          <ellipse cx="51" cy="28" rx="3" ry="3.5" fill="#3D2B1A"/>
          <circle cx="40" cy="27" r="1" fill="white"/>
          <circle cx="52" cy="27" r="1" fill="white"/>
          <!-- Cílios -->
          <path d="M36 25 Q39 23 42 25" stroke="#1a0a00" stroke-width="1" fill="none"/>
          <path d="M48 25 Q51 23 54 25" stroke="#1a0a00" stroke-width="1" fill="none"/>
          <!-- Nariz -->
          <path d="M44 32 Q45 34 46 32" stroke="rgba(0,0,0,.3)" stroke-width="1" fill="none"/>
          <!-- Boca / batom -->
          <path d="M39 38 Q45 43 51 38" fill="#FF2D7A"/>
          <path d="M39 38 Q45 42 51 38" stroke="#C2185B" stroke-width="0.5" fill="none"/>
          <!-- Roupa rosa -->
          <path d="M30 50 Q45 46 60 50 L63 74 Q45 78 27 74Z" fill="#FF2D7A"/>
          <!-- Detalhe top -->
          <path d="M38 50 Q45 53 52 50" stroke="rgba(255,255,255,.4)" stroke-width="1.5" fill="none"/>
          <!-- Ombros/alças -->
          <path d="M30 50 Q27 44 32 42 Q35 46 38 50" fill="#FF2D7A"/>
          <path d="M60 50 Q63 44 58 42 Q55 46 52 50" fill="#FF2D7A"/>
          <!-- Calça/saia -->
          <path d="M29 74 L33 88 L45 85 L57 88 L61 74 Q45 78 29 74Z" fill="#C2185B"/>
          <!-- Câmera na mão -->
          <rect x="60" y="62" width="18" height="13" rx="3" fill="#2a2a2a"/>
          <circle cx="69" cy="68" r="4" fill="#1A56DB" stroke="#40C4FF" stroke-width="1"/>
          <circle cx="69" cy="68" r="2" fill="#0a1a3a"/>
          <rect x="62" y="60" width="6" height="4" rx="1" fill="#2a2a2a"/>
          <!-- Flash câmera -->
          <text x="80" y="64" font-size="10">✨</text>
          <!-- Sapato -->
          <path d="M33 88 Q31 90 38 90 L39 88" fill="#CC1055"/>
          <path d="M57 88 Q59 90 52 90 L51 88" fill="#CC1055"/>
        </svg>
        <div class="char-name-virginia">VIRGINIA 📸</div>
      </div>
    </div>

    <!-- LOGO -->
    <div class="logo-strip">
      <span class="logo-small">GRUPO</span>
      <span class="logo-big">KUHN<span class="logo-dot">.</span></span>
    </div>

    <div class="title-main">
      <span class="title-vini">CORRIDA</span>
      <span class="title-vs">×</span>
      <span class="title-virg">PRÊMIOS</span>
    </div>
    <div class="subtitle">🏆 Gire e descubra o seu prêmio 🏆</div>
  </div>

  <!-- TELA 1: LOGIN -->
  <div id="screen-login" class="screen active">
    <div class="card">
      <div class="card-title">⚡ ACESSO DO JOGADOR</div>
      <div class="card-sub">Preencha seus dados para entrar na corrida</div>

      <div class="fg">
        <label>Nome completo</label>
        <input type="text" id="input-nome" placeholder="Seu nome aqui..." autocomplete="off">
      </div>
      <div class="fg">
        <label>Loja / Unidade</label>
        <input type="text" id="input-loja" placeholder="Nome da sua loja..." autocomplete="off">
      </div>
      <div class="fg">
        <label>Chave PIX</label>
        <input type="text" id="input-pix" placeholder="CPF, e-mail ou telefone..." autocomplete="off">
      </div>
      <div class="fg">
        <label>Senha de acesso</label>
        <input type="text" id="input-senha" placeholder="Senha fornecida pelo gestor..." autocomplete="off">
      </div>

      <button class="btn-ok" id="btn-entrar" onclick="validarAcesso()">🏁 ENTRAR NA CORRIDA</button>
      <div id="error-login" class="err" style="display:none"></div>
    </div>
  </div>

  <!-- TELA 2: ROLETA -->
  <div id="screen-roleta" class="screen">
    <div class="badge">
      <span>Na pista</span>
      <strong id="nome-display">—</strong>
    </div>

    <!-- MINI CORRIDA VISUAL -->
    <div class="race-bar">
      <div class="race-vini">⚽ <span>VINI JR</span></div>
      <div class="race-mid">🏁</div>
      <div class="race-virginia"><span>VIRGINIA</span> 📸</div>
    </div>

    <div class="wheel-wrap">
      <div class="wheel-chars">
        <span class="wc-char">⚽</span>
        <span class="wc-char">📸</span>
      </div>
      <div class="wheel-ring">
        <div class="wheel-arrow"></div>
        <canvas id="wc" width="310" height="310"></canvas>
        <div class="wheel-mid">🏆</div>
      </div>
    </div>
    <button class="btn-spin" id="btn-spin" onclick="girarRoleta()">🏁 GIRAR E CORRER! 🏁</button>
  </div>

  <!-- TELA 3: RESULTADO -->
  <div id="screen-resultado" class="screen">
    <div class="res-card">
      <div class="res-head" id="res-head">
        <span class="res-emoji" id="res-emoji">🎉</span>
        <div class="res-titulo">PARABÉNS! VOCÊ CRUZOU A LINHA COM:</div>
        <div class="res-premio" id="res-premio">—</div>
      </div>
      <div class="res-body">
        <div class="info-row"><span class="il">Vendedor</span><span class="iv" id="res-vendedor">—</span></div>
        <div class="info-row"><span class="il">Loja</span><span class="iv" id="res-loja">—</span></div>
        <div class="info-row"><span class="il">PIX</span><span class="iv" id="res-pix">—</span></div>
        <div class="info-row"><span class="il">Data</span><span class="iv" id="res-data">—</span></div>
        <div class="cod-box">
          <div class="cod-label">🏆 Código do Prêmio</div>
          <div class="cod-val" id="res-codigo">—</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /wrap -->

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdXzKRG0Eg8bCmmeKbgA8Bl-ktHe4icYa8BQYiPr4sza9PP4w-vTewQsPTPnZQEaEY/exec';

let premios        = [];
let nomeAtual      = '';
let lojaAtual      = '';
let pixAtual       = '';
let senhaAtual     = '';
let isSpinning     = false;
let jaGirou        = false;
let anguloAtual    = 0;
let premioSorteado = null;

// Paleta de corrida: azul Real Madrid alternado com rosa Virginia
const CORES = ['#1A56DB','#FF2D7A','#0D3B9E','#C2185B','#1565C0','#E91E8C','#0A2472','#AD1457','#1976D2','#D81B60'];

function mostrarTela(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb  = '__cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
    const el  = document.createElement('script');
    const tmr = setTimeout(() => { clean(); reject(new Error('timeout')); }, 12000);
    function clean() { clearTimeout(tmr); delete window[cb]; if (el.parentNode) el.parentNode.removeChild(el); }
    window[cb] = d => { clean(); resolve(d); };
    el.onerror = () => { clean(); reject(new Error('erro')); };
    el.src     = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.head.appendChild(el);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  ['input-nome','input-loja','input-pix','input-senha'].forEach(id => {
    document.getElementById(id).addEventListener('keypress', e => { if (e.key==='Enter') validarAcesso(); });
  });
});

async function validarAcesso() {
  const nome  = document.getElementById('input-nome').value.trim();
  const loja  = document.getElementById('input-loja').value.trim();
  const pix   = document.getElementById('input-pix').value.trim();
  const senha = document.getElementById('input-senha').value.trim().toUpperCase();
  const btn   = document.getElementById('btn-entrar');
  document.getElementById('error-login').style.display = 'none';

  if (!nome)  { erro('Informe seu nome.');  return; }
  if (!loja)  { erro('Informe sua loja.');  return; }
  if (!pix)   { erro('Informe seu PIX.');   return; }
  if (!senha) { erro('Informe a senha.');   return; }

  btn.innerHTML = '<span class="ld"></span>Verificando...';
  btn.disabled  = true;

  try {
    const data = await jsonp(APPS_SCRIPT_URL + '?acao=validar&senha=' + encodeURIComponent(senha) + '&nome=' + encodeURIComponent(nome) + '&loja=' + encodeURIComponent(loja) + '&pix=' + encodeURIComponent(pix));
    if (data.ok) {
      nomeAtual = nome; lojaAtual = loja; pixAtual = pix; senhaAtual = senha;
      premios   = data.premios;
      irParaRoleta();
    } else {
      erro(data.mensagem || 'Senha inválida ou já utilizada.');
      btn.innerHTML = '🏁 ENTRAR NA CORRIDA'; btn.disabled = false;
    }
  } catch(e) {
    erro('Erro de conexão. Tente novamente.');
    btn.innerHTML = '🏁 ENTRAR NA CORRIDA'; btn.disabled = false;
  }
}

function erro(msg) {
  const el = document.getElementById('error-login');
  el.textContent = msg; el.style.display = 'block';
}

function irParaRoleta() {
  document.getElementById('nome-display').textContent = nomeAtual;
  mostrarTela('screen-roleta');
  desenhar(0);
}

function desenhar(ang) {
  const cv  = document.getElementById('wc');
  const ctx = cv.getContext('2d');
  const cx  = cv.width/2, cy = cv.height/2, r = cx - 4;
  const n   = premios.length;
  if (!n) return;
  const arc = (2*Math.PI)/n;
  ctx.clearRect(0, 0, cv.width, cv.height);

  for (let i = 0; i < n; i++) {
    const ini = ang + i*arc - Math.PI/2;
    const fim = ini + arc;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,ini,fim); ctx.closePath();
    ctx.fillStyle = CORES[i % CORES.length]; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.6)'; ctx.lineWidth = 2.5; ctx.stroke();

    ctx.save(); ctx.translate(cx,cy); ctx.rotate(ini + arc/2);
    const lbl = (premios[i].nome||'').substring(0,13) + ((premios[i].nome||'').length>13?'…':'');
    const em  = premios[i].emoji || '🏆';
    const tx  = r - 12;
    ctx.textAlign = 'right'; ctx.fillStyle = 'white';
    ctx.shadowColor = 'rgba(0,0,0,.95)'; ctx.shadowBlur = 5;
    ctx.font = 'bold 12px Nunito,sans-serif'; ctx.fillText(lbl, tx, 5);
    ctx.font = '15px serif'; ctx.shadowBlur = 3;
    ctx.fillText(em, tx - ctx.measureText(lbl).width - 4, 6);
    ctx.restore();
  }

  // Centro
  ctx.beginPath(); ctx.arc(cx,cy,30,0,2*Math.PI);
  ctx.fillStyle = '#0A0A0F'; ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3; ctx.stroke();
}

function girarRoleta() {
  if (isSpinning || jaGirou) return;
  jaGirou = isSpinning = true;
  document.getElementById('btn-spin').disabled = true;

  premioSorteado = sortear();

  const voltas = 5 + Math.floor(Math.random() * 5);
  const angFim = anguloAtual + voltas * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const dur    = 4000 + Math.random() * 1500;
  const tIni   = performance.now();
  const aIni   = anguloAtual;

  function animar(now) {
    const t    = Math.min((now - tIni) / dur, 1);
    const ease = 1 - Math.pow(1-t, 4);
    anguloAtual = aIni + (angFim - aIni) * ease;
    desenhar(anguloAtual);
    if (t < 1) { requestAnimationFrame(animar); }
    else { isSpinning = false; setTimeout(() => mostrarResultado(premioSorteado), 600); }
  }
  requestAnimationFrame(animar);
}

function sortear() {
  const total = premios.reduce((s,p) => s + (Number(p.probabilidade)||1), 0);
  let r = Math.random() * total;
  for (const p of premios) { r -= (Number(p.probabilidade)||1); if (r<=0) return p; }
  return premios[premios.length-1];
}

async function mostrarResultado(premio) {
  const cod  = gerarCod();
  const now  = new Date();
  const data = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  try {
    jsonp(APPS_SCRIPT_URL + '?acao=registrar&senha=' + encodeURIComponent(senhaAtual) + '&nome=' + encodeURIComponent(nomeAtual) + '&loja=' + encodeURIComponent(lojaAtual) + '&pix=' + encodeURIComponent(pixAtual) + '&premio=' + encodeURIComponent(premio.nome) + '&codigo=' + encodeURIComponent(cod)).catch(()=>{});
  } catch(e){}

  // Alterna tema Vini/Virginia baseado no índice do prêmio
  const idxPremio = premios.indexOf(premio);
  const resHead = document.getElementById('res-head');
  if (idxPremio % 2 === 0) {
    resHead.classList.remove('team-virginia');
  } else {
    resHead.classList.add('team-virginia');
  }

  document.getElementById('res-emoji').textContent    = premio.emoji || '🏆';
  document.getElementById('res-premio').textContent   = premio.nome;
  document.getElementById('res-vendedor').textContent = nomeAtual;
  document.getElementById('res-loja').textContent     = lojaAtual;
  document.getElementById('res-pix').textContent      = pixAtual;
  document.getElementById('res-data').textContent     = data;
  document.getElementById('res-codigo').textContent   = cod;

  mostrarTela('screen-resultado');
  confetti();
}

function gerarCod() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = 'KB-';
  for (let i=0;i<6;i++) s += c[Math.floor(Math.random()*c.length)];
  return s;
}

function confetti() {
  // Cores: azul Real Madrid + rosa Virginia + dourado
  const cores = ['#1A56DB','#FF2D7A','#FFD700','#FFFFFF','#40C4FF','#FF80AB'];
  for (let i=0;i<80;i++) setTimeout(()=>{
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.left = Math.random()*100+'vw';
    el.style.backgroundColor = cores[Math.floor(Math.random()*cores.length)];
    el.style.width  = (5+Math.random()*10)+'px';
    el.style.height = (5+Math.random()*12)+'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (1.5+Math.random()*2.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }, i*25);
}
</script>
</body>
</html>
