<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roleta da Sorte — Grupo Kuhn</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --rosa:      #FF4081;
  --verde:     #00C853;
  --azul:      #40C4FF;
  --preto:     #111122;
  --card-bg:   rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--preto);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:''; position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 10% 0%,   rgba(255,64,129,.18) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 5%,   rgba(0,200,83,.15)   0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(64,196,255,.12) 0%, transparent 50%),
    var(--preto);
}

/* ── PARTÍCULAS FLUTUANDO ── */
.p { position:fixed; pointer-events:none; z-index:0; animation:fp 7s ease-in-out infinite; opacity:.2; font-size:1.2rem; }
.p:nth-child(1){top:6%;left:5%;animation-delay:0s}
.p:nth-child(2){top:18%;right:6%;animation-delay:1s;font-size:.9rem}
.p:nth-child(3){top:50%;left:3%;animation-delay:2.2s;font-size:1.5rem}
.p:nth-child(4){top:62%;right:4%;animation-delay:.6s;font-size:1rem}
.p:nth-child(5){bottom:18%;left:10%;animation-delay:1.8s;font-size:1.3rem}
.p:nth-child(6){bottom:6%;right:12%;animation-delay:3s;font-size:.8rem}
@keyframes fp { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-14px) rotate(25deg)} }

.wrap { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:16px 16px 48px; }

/* ── HEADER ── */
.header { text-align:center; margin-bottom:20px; animation:sd .6s ease; }
@keyframes sd { from{opacity:0;transform:translateY(-28px)} to{opacity:1;transform:translateY(0)} }

/* PERSONAGENS SVG */
.ppg-chars {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 8px;
  margin-bottom: 10px;
}

.logo-strip {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(255,64,129,.3), rgba(0,200,83,.3));
  border: 1.5px solid rgba(255,255,255,.15);
  border-radius: 16px;
  padding: 10px 18px;
  margin-bottom: 10px;
  backdrop-filter: blur(8px);
}
.logo-small { font-family:'Fredoka One',cursive; font-size:.8rem; color:rgba(255,255,255,.6); letter-spacing:2px; }
.logo-big   { font-family:'Fredoka One',cursive; font-size:1.7rem; color:white; line-height:1; }

.title-main {
  font-family: 'Fredoka One', cursive;
  font-size: 2.2rem;
  color: white;
  line-height: 1;
  text-shadow: 3px 3px 0 var(--rosa);
}
.title-main span { color: var(--verde); text-shadow: 3px 3px 0 #005C25; }
.subtitle { font-size:.85rem; color:rgba(255,255,255,.5); margin-top:6px; font-weight:700; }

/* ── CARD ── */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border-radius: 22px;
  padding: 26px 22px;
  border: 1.5px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.card-title { font-family:'Fredoka One',cursive; font-size:1.3rem; color:var(--verde); text-align:center; margin-bottom:4px; }
.card-sub   { font-size:.82rem; color:rgba(255,255,255,.45); text-align:center; margin-bottom:18px; }

.fg { margin-bottom:13px; }
label { display:block; font-size:.72rem; font-weight:900; color:rgba(255,255,255,.6); margin-bottom:5px; text-transform:uppercase; letter-spacing:1px; }
input[type="text"] {
  width:100%; padding:13px 15px;
  border: 1.5px solid rgba(255,255,255,.12);
  border-radius: 12px;
  font-size: 1rem; font-family:'Nunito',sans-serif; font-weight:700;
  color: white; background: rgba(255,255,255,.07);
  outline: none; transition: all .2s;
}
input[type="text"]:focus { border-color:var(--verde); background:rgba(0,200,83,.1); box-shadow:0 0 0 3px rgba(0,200,83,.15); }
input[type="text"]::placeholder { color:rgba(255,255,255,.2); font-weight:400; }

.btn-ok {
  width:100%; padding:15px;
  background: linear-gradient(135deg, var(--verde), #00952E);
  color: white; border: none; border-radius:14px;
  font-family:'Fredoka One',cursive; font-size:1.25rem;
  cursor:pointer; box-shadow:0 6px 20px rgba(0,200,83,.45);
  transition:all .2s; margin-top:6px;
}
.btn-ok:active { transform:scale(.97); }
.btn-ok:disabled { background:#333; box-shadow:none; color:#666; cursor:not-allowed; }

.err {
  background:rgba(255,64,129,.15); border:1px solid var(--rosa);
  border-radius:10px; padding:11px 14px; color:#FF80AB;
  font-size:.88rem; font-weight:700; text-align:center;
  margin-top:10px; animation:shake .4s ease;
}
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

/* ── TELAS ── */
.screen { display:none; }
.screen.active { display:block; animation:fi .45s ease; }
@keyframes fi { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

/* ── BADGE ── */
.badge {
  background: linear-gradient(135deg, rgba(0,200,83,.2), rgba(255,64,129,.2));
  border: 1.5px solid rgba(0,200,83,.35);
  border-radius: 50px; padding:9px 18px; text-align:center;
  margin-bottom:18px;
}
.badge span { font-size:.72rem; color:rgba(255,255,255,.5); font-weight:800; text-transform:uppercase; letter-spacing:1px; }
.badge strong { display:block; font-family:'Fredoka One',cursive; font-size:1.35rem; color:var(--verde); line-height:1.1; }

/* ── ROLETA (sem seta) ── */
.wheel-wrap {
  display: flex; flex-direction:column; align-items:center; margin-bottom:18px;
}
.wheel-ring {
  position:relative; width:310px; height:310px; border-radius:50%;
  box-shadow:
    0 0 0 5px var(--preto),
    0 0 0 8px var(--rosa),
    0 0 0 11px var(--preto),
    0 0 30px rgba(255,64,129,.5),
    0 10px 40px rgba(0,0,0,.7);
}
#wc { width:310px; height:310px; border-radius:50%; display:block; }
.wheel-mid {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:54px; height:54px; background:var(--preto); border-radius:50%;
  border:3px solid var(--rosa);
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; z-index:5;
  box-shadow:0 0 0 3px var(--preto), 0 0 18px rgba(255,64,129,.6);
}

.btn-spin {
  width:100%; padding:17px;
  background: linear-gradient(135deg, var(--rosa), #C2185B);
  color:white; border:none; border-radius:14px;
  font-family:'Fredoka One',cursive; font-size:1.45rem;
  cursor:pointer; box-shadow:0 6px 20px rgba(255,64,129,.5);
  transition:all .2s; margin-top:14px; letter-spacing:.5px;
}
.btn-spin:active { transform:scale(.97); }
.btn-spin:disabled { background:#333; color:#555; box-shadow:none; cursor:not-allowed; }

/* ── RESULTADO ── */
.res-card {
  background: var(--card-bg); backdrop-filter:blur(10px);
  border-radius:22px; overflow:hidden;
  border:1.5px solid rgba(0,200,83,.3);
  box-shadow:0 12px 40px rgba(0,0,0,.6); margin-bottom:14px;
}
.res-head {
  background: linear-gradient(135deg, #005C25, var(--verde));
  padding:26px 18px; text-align:center; position:relative; overflow:hidden;
}
.res-head::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 30% 50%, rgba(255,255,255,.12), transparent 60%);
}
.res-emoji { font-size:3.2rem; display:block; margin-bottom:5px; animation:bi .6s ease; }
@keyframes bi { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
.res-titulo { font-family:'Fredoka One',cursive; font-size:1rem; color:rgba(255,255,255,.8); }
.res-premio { font-family:'Fredoka One',cursive; font-size:1.9rem; color:white; line-height:1.1; margin-top:3px; text-shadow:2px 2px 0 rgba(0,0,0,.3); }
.res-body { padding:18px; }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid rgba(255,255,255,.07); font-size:.88rem; }
.info-row:last-child { border-bottom:none; }
.il { color:rgba(255,255,255,.38); font-weight:800; text-transform:uppercase; font-size:.7rem; letter-spacing:.5px; }
.iv { font-weight:800; color:white; text-align:right; max-width:65%; }
.cod-box {
  background:rgba(0,200,83,.08); border:1.5px dashed rgba(0,200,83,.45);
  border-radius:12px; padding:13px; text-align:center; margin:14px 0 2px;
}
.cod-label { font-size:.7rem; font-weight:900; color:rgba(0,200,83,.7); text-transform:uppercase; letter-spacing:1px; }
.cod-val { font-family:'Fredoka One',cursive; font-size:1.9rem; color:var(--verde); letter-spacing:3px; }

/* utils */
.ld { display:inline-block; width:17px; height:17px; border:3px solid rgba(255,255,255,.25); border-top-color:white; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:7px; }
@keyframes spin { to{transform:rotate(360deg)} }
.cf { position:fixed; top:-10px; border-radius:2px; animation:cff linear forwards; pointer-events:none; z-index:999; }
@keyframes cff { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdXzKRG0Eg8bCmmeKbgA8Bl-ktHe4icYa8BQYiPr4sza9PP4w-vTewQsPTPnZQEaEY/exec';

let premios     = [];
let nomeAtual   = '';
let lojaAtual   = '';
let pixAtual    = '';
let senhaAtual  = '';
let isSpinning  = false;
let jaGirou     = false;
let anguloAtual = 0;
let premioSorteado = null;

const CORES = ['#00C853','#FF4081','#40C4FF','#E040FB','#FF6D00','#00BCD4','#76FF03','#FF1744','#FFD740','#1A237E'];

function mostrarTela(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb   = '__cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
    const el   = document.createElement('script');
    const tmr  = setTimeout(() => { clean(); reject(new Error('timeout')); }, 12000);
    function clean() { clearTimeout(tmr); delete window[cb]; if (el.parentNode) el.parentNode.removeChild(el); }
    window[cb]  = d => { clean(); resolve(d); };
    el.onerror  = () => { clean(); reject(new Error('erro')); };
    el.src      = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    document.head.appendChild(el);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  ['input-nome','input-loja','input-pix','input-senha'].forEach(id => {
    document.getElementById(id).addEventListener('keypress', e => { if (e.key==='Enter') validarAcesso(); });
  });
});

async function validarAcesso() {
  const nome  = document.getElementById('input-nome').value.trim();
  const loja  = document.getElementById('input-loja').value.trim();
  const pix   = document.getElementById('input-pix').value.trim();
  const senha = document.getElementById('input-senha').value.trim().toUpperCase();
  const btn   = document.getElementById('btn-entrar');
  document.getElementById('error-login').style.display = 'none';

  if (!nome)  { erro('Informe seu nome.');   return; }
  if (!loja)  { erro('Informe sua loja.');   return; }
  if (!pix)   { erro('Informe seu PIX.');    return; }
  if (!senha) { erro('Informe a senha.');    return; }

  btn.innerHTML = '<span class="ld"></span>Verificando...';
  btn.disabled  = true;

  try {
    const data = await jsonp(APPS_SCRIPT_URL + '?acao=validar&senha=' + encodeURIComponent(senha) + '&nome=' + encodeURIComponent(nome) + '&loja=' + encodeURIComponent(loja) + '&pix=' + encodeURIComponent(pix));
    if (data.ok) {
      nomeAtual = nome; lojaAtual = loja; pixAtual = pix; senhaAtual = senha;
      premios   = data.premios;
      irParaRoleta();
    } else {
      erro(data.mensagem || 'Senha inválida ou já utilizada.');
      btn.innerHTML = 'Confirmar'; btn.disabled = false;
    }
  } catch(e) {
    erro('Erro de conexão. Tente novamente.');
    btn.innerHTML = 'Confirmar'; btn.disabled = false;
  }
}

function erro(msg) {
  const el = document.getElementById('error-login');
  el.textContent = msg; el.style.display = 'block';
}

function irParaRoleta() {
  document.getElementById('nome-display').textContent = nomeAtual;
  mostrarTela('screen-roleta');
  desenhar(0);
}

function desenhar(ang) {
  const cv  = document.getElementById('wc');
  const ctx = cv.getContext('2d');
  const cx  = cv.width/2, cy = cv.height/2, r = cx - 4;
  const n   = premios.length;
  if (!n) return;
  const arc = (2*Math.PI)/n;
  ctx.clearRect(0, 0, cv.width, cv.height);

  for (let i = 0; i < n; i++) {
    const ini = ang + i*arc - Math.PI/2;
    const fim = ini + arc;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,ini,fim); ctx.closePath();
    ctx.fillStyle = CORES[i % CORES.length]; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.55)'; ctx.lineWidth = 2.5; ctx.stroke();

    ctx.save(); ctx.translate(cx,cy); ctx.rotate(ini + arc/2);
    const lbl = (premios[i].nome||'').substring(0,13) + ((premios[i].nome||'').length>13?'…':'');
    const em  = premios[i].emoji || '🎁';
    const tx  = r - 12;
    ctx.textAlign = 'right'; ctx.fillStyle = 'white';
    ctx.shadowColor = 'rgba(0,0,0,.9)'; ctx.shadowBlur = 4;
    ctx.font = 'bold 12px Nunito,sans-serif'; ctx.fillText(lbl, tx, 5);
    ctx.font = '15px serif'; ctx.shadowBlur = 3;
    ctx.fillText(em, tx - ctx.measureText(lbl).width - 4, 6);
    ctx.restore();
  }

  ctx.beginPath(); ctx.arc(cx,cy,28,0,2*Math.PI);
  ctx.fillStyle = '#111122'; ctx.fill();
  ctx.strokeStyle = '#FF4081'; ctx.lineWidth = 3; ctx.stroke();
}

function girarRoleta() {
  if (isSpinning || jaGirou) return;
  jaGirou = isSpinning = true;
  document.getElementById('btn-spin').disabled = true;

  // Sorteia PRIMEIRO
  premioSorteado = sortear();

  // Gira por um tempo aleatório — animação decorativa apenas
  const voltas  = 5 + Math.floor(Math.random() * 5);
  const angFim  = anguloAtual + voltas * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const dur     = 4000 + Math.random() * 1500;
  const tIni    = performance.now();
  const aIni    = anguloAtual;

  function animar(now) {
    const t    = Math.min((now - tIni) / dur, 1);
    const ease = 1 - Math.pow(1-t, 4);
    anguloAtual = aIni + (angFim - aIni) * ease;
    desenhar(anguloAtual);
    if (t < 1) { requestAnimationFrame(animar); }
    else { isSpinning = false; setTimeout(() => mostrarResultado(premioSorteado), 600); }
  }
  requestAnimationFrame(animar);
}

function sortear() {
  const total = premios.reduce((s,p) => s + (Number(p.probabilidade)||1), 0);
  let r = Math.random() * total;
  for (const p of premios) { r -= (Number(p.probabilidade)||1); if (r<=0) return p; }
  return premios[premios.length-1];
}

async function mostrarResultado(premio) {
  const cod  = gerarCod();
  const now  = new Date();
  const data = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  try {
    jsonp(APPS_SCRIPT_URL + '?acao=registrar&senha=' + encodeURIComponent(senhaAtual) + '&nome=' + encodeURIComponent(nomeAtual) + '&loja=' + encodeURIComponent(lojaAtual) + '&pix=' + encodeURIComponent(pixAtual) + '&premio=' + encodeURIComponent(premio.nome) + '&codigo=' + encodeURIComponent(cod)).catch(()=>{});
  } catch(e){}

  document.getElementById('res-emoji').textContent    = premio.emoji || '🎉';
  document.getElementById('res-premio').textContent   = premio.nome;
  document.getElementById('res-vendedor').textContent = nomeAtual;
  document.getElementById('res-loja').textContent     = lojaAtual;
  document.getElementById('res-pix').textContent      = pixAtual;
  document.getElementById('res-data').textContent     = data;
  document.getElementById('res-codigo').textContent   = cod;

  mostrarTela('screen-resultado');
  confetti();
}

function gerarCod() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = 'KB-';
  for (let i=0;i<6;i++) s += c[Math.floor(Math.random()*c.length)];
  return s;
}

function confetti() {
  const cores = ['#00C853','#FF4081','#40C4FF','#E040FB','#76FF03','#FFD740'];
  for (let i=0;i<70;i++) setTimeout(()=>{
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.left = Math.random()*100+'vw';
    el.style.backgroundColor = cores[Math.floor(Math.random()*cores.length)];
    el.style.width  = (6+Math.random()*10)+'px';
    el.style.height = (6+Math.random()*10)+'px';
    el.style.animationDuration = (1.5+Math.random()*2)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }, i*28);
}
</script>
